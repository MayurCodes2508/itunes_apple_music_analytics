version: 2
models:
  - name: stg_invoice_line_focused
    description: >
      Staging model for invoice_line,
      1-M relationship with invoice_id and track_id having multiple invoice_line_id so stg_invoice_line_focused.invoice_id and track_id
      (FK) -> stg_invoice_focused.invoice_id (PK) and stg_track_focused.track_id (PK),
      Grain: 1 row represents 1 unique identifier invoice_line_id of invoice_line
    columns:
      - name: invoice_line_id
        description: >
          Unique identifier for an invoice_line
        tests:
          - not_null
          - unique

      - name: invoice_id
        description: >
          Unique identifier for a invoice
        tests:
          - relationships:
              arguments:
                to: ref('stg_invoice_focused')
                field: invoice_id

      - name: track_id
        description: >
          Unique identifier for a track
        tests:
          - relationships:
              arguments:
                to: ref('stg_track_focused')
                field: track_id

      - name: unit_price
        description: >
          Unit price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: '>= 0'

      - name: quantity
        description: >
          Unit price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: '>= 0'