version: 2
models:
  - name: stg_artist_focused
    description: >
      Staging model for artist
      Grain: 1 row represents 1 unique identifier artist_id of artist
    columns:
      - name: artist_id
        description: >
          Unique identifier for an artist
        tests:
          - not_null
          - unique

      - name: name
        description: >
          Name of the artist