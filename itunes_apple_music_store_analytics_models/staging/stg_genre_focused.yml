version: 2
models:
  - name: stg_genre_focused
    description: >
      Staging model for genre
      Grain: 1 row represents 1 unique identifier genre_id of genre
    columns:
      - name: genre_id
        description: >
          Unique identifier for a genre
        tests:
          - not_null
          - unique

      - name: name
        description: >
          Name of the genre