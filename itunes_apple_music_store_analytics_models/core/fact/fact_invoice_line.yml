version: 2
models:
  - name: fact_invoice_line
    description: >
      Fact model for invoice line,
      1:M relatonship with invoice_key, date_key, customer_key, employee_key, track_key having multiple
      invoice_line_key,
      Grain: 1 row represents 1 unique identifier invoice_line_key of invoice line
    columns:
      - name: invoice_line_key
        description: >
          Unique identifier for an invoice line
        tests:
          - not_null
          - unique

      - name: invoice_line_id
        description: >
          Unique identifier for an invoice line
        tests:
          - not_null
          - unique

      - name: invoice_key
        description: >
          Unique identifier for an invoice
        tests:
          - relationships:
              arguments:
                to: ref('dim_invoice')
                field: invoice_key

      - name: date_key
        description: >
          Unique identifier for a date
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: customer_key
        description: >
          Unique identifier for a customer
        tests:
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key

      - name: employee_key
        description: >
          Unique identifier for an employee
        tests:
          - relationships:
              arguments:
                to: ref('dim_employee')
                field: employee_key

      - name: track_key
        description: >
          Unique identifier for a track
        tests:
          - relationships:
              arguments:
                to: ref('dim_track')
                field: track_key

      - name: unit_price
        description: >
          Unit price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: '>= 0'

      - name: quantity
        description: >
          Unit price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: '>= 0'

      - name: total_revenue
        description: >
          Unit price * quantity = total_revenue,
          Total revenue of invoice line
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: '>= 0'