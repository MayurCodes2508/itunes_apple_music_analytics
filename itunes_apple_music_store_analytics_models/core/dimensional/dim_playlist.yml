version: 2
models:
  - name: dim_playlist
    description: >
      Dimensional model for playlist
      Grain: 1 row represents 1 unique identifier playlist_key of playlist
    columns:
      - name: playlist_key
        description: >
          Unique identifier for a playlist
        tests:
          - not_null
          - unique

      - name: playlist_id
        description: >
          Unique identifier for a playlist
        tests:
          - not_null
          - unique

      - name: playlist_name
        description: >
          Name of the playlist