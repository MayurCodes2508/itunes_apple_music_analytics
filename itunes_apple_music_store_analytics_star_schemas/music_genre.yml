staging:
  tables:
    - name: stg_genre_focused
      description: >
        Contains genre name, its unique identifier genre_id
        Grain: 1 row represents 1 genre identified by genre_id
      
      dimension_attributes:
        columns:
          - name: genre_id
            description: >
              Unique identifier for grain
            type: int

          - name: name
            description: >
              Name of the genre
            type: text

      metrics:
        columns: none