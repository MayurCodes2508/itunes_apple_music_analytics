Staging:
  Tables:
    - name: stg_sales_focused_grain
      grain: 1 row represents 1 game x platform x year

      columns:
        - name: name
          type: text

        - name: platform
          type: text

        - name: year
          type: int

        - name: genre
          type: text

        - name: publisher
          type: text

        - name: na_sales
          type: float

        - name: eu_sales
          type: float

        - name: jp_sales
          type: float

        - name: other_sales
          type: float


Metrics:
  columns:
    - name: na_sales
      type: float

    - name: eu_sales
      type: float

    - name: jp_sales
      type: float

    - name: other_sales
      type: float

    - name: global_sales
      type: float


Dimension Attributes:
  columns:
    - name: name
      type: text

    - name: platform
      type: text

    - name: year
      type: int

    - name: genre
      type: text

    - name: publisher
      type: text


Intermediate:
  Tables:


Dimensions:
  Tables:
    - name: dim_release
      grain: 1 row represents 1 game x platform x year
      columns:
        - name: release_id (Surrogate Key which uniquely identifies grain)
          type: text

        - name: name
          type: text

        - name: platform
          type: text

        - name: year
          type: int

        - name: genre
          type: text

        - name: publisher
          type: text

    - name: dim_region
      grain: 1 row represents 1 region
      columns:
        - name: region_id (Surrogate Key which uniquely identifies grain)
          type: text

        - name: region
          type: text


Bridges:
  Tables:


Facts:
  Tables:
    - name: fact_sales_by_region
      grain: 1 row represents 1 release x region
      columns:
        - name: release_id FK --> PK to dim_release.release_id
          type: text

        - name: region_id FK --> PK to dim_region.region_id
          type: text

        - name: sales
          type: float